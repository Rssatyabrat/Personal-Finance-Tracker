<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinanceFlow</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js" defer></script>
</head>
<body>
    <div class="auth-container">
        <form id="login-form" class="auth-form fade-in-element appear">
            <h2>Welcome Back</h2>
            <p>Securely access your financial dashboard.</p>

            <div class="input-group">
                <label for="username">Email</label>
                <input type="email" id="username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>

            <div class="cta-buttons">
                <button type="submit" class="btn btn-login">Login</button>
                <p class="switch-auth">New here? <a href="signup.html">Create an account</a></p>
            </div>
            
            <div class="home-nav">
                <hr> 
                <a href="index.html" class="btn-home">Return to Home</a>
            </div>
        </form>
    </div>
</body>
</html>
